services:
  # Backend FastAPI Service
  - type: web
    name: ish-top-backend
    runtime: python
    env: python
    region: frankfurt
    rootDirectory: backend
    buildCommand: "pip install -r requirements.txt"
    preDeployCommand: "alembic upgrade head"
    startCommand: "gunicorn -k uvicorn.workers.UvicornWorker app.main:app"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ish-top-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: PYTHON_VERSION
        value: 3.10.0
      # Введите TELEGRAM_BOT_TOKEN вручную в панели Render Dashboard

  # Frontend Static Service
  - type: web
    name: ish-top-frontend
    runtime: static
    rootDirectory: frontend
    buildCommand: "npm install && npm run build"
    staticPublishPath: "dist"
    envVars:
      - key: VITE_API_BASE_URL
        fromService:
          type: web
          name: ish-top-backend
          property: host
    routes:
      - type: rewrite
        source: "/*"
        destination: "/index.html"

databases:
  - name: ish-top-db
    plan: free
    region: frankfurt
